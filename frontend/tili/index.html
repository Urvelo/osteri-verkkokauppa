<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- Security Headers -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Oma tili – ERÄT.FI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=35">
</head>
<body>

  <main id="pageContent" class="account-page view-fade">
    <div class="container" style="padding-top:24px">
      <a class="detail-back" href="../">&#8592; Takaisin kauppaan</a>

      <!-- Logged in view -->
      <div id="accountLoggedIn" style="display:none">
        <div class="account-header">
          <img class="account-avatar" id="accountAvatar" src="" alt="" style="display:none">
          <div class="account-avatar-placeholder" id="accountAvatarPlaceholder">??</div>
          <div class="account-info">
            <h2 id="accountName">–</h2>
            <p id="accountEmail">–</p>
          </div>
        </div>
        <div class="account-stats">
          <div class="account-stat"><div class="num" id="accOrderCount">0</div><div class="label">Tilauksia</div></div>
          <div class="account-stat"><div class="num" id="accMember">–</div><div class="label">Jäsen</div></div>
        </div>
        <div class="account-actions">
          <button class="btn btn--sm btn--outline" onclick="auth.signOut();showToast('Kirjauduit ulos');window.location.href=ROOT;">Kirjaudu ulos</button>
        </div>
        <h3 class="orders-title">Tilaushistoria <span class="count" id="ordersCountBadge">0</span></h3>
        <div id="ordersContainer"></div>
      </div>

      <!-- Logged out view -->
      <div id="accountLoggedOut" class="login-prompt">
        <h2>Kirjaudu sisään</h2>
        <p>Kirjaudu Google-tililläsi nähdäksesi tilaushistoriasi ja kuitit.</p>
        <button class="google-btn" onclick="signInWithGoogle()" style="max-width:360px;margin:0 auto"></button>
      </div>
    </div>
  </main>


  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>var ROOT = '../'; var PAGE_ID = 'account';</script>
  <script src="../js/supabase-data.js?v=35"></script>
  <script src="../js/shared.js?v=35"></script>
  <script src="../js/account.js?v=35"></script>
</body>
</html>
